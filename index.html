<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f4f6fb;
  text-align:center;
}

.container{
  padding:40px 20px;
}

h1{
  font-size:42px;
  color:#4a78f0;
}

.subtitle{
  color:#666;
  margin-bottom:20px;
}

.score{
  font-size:24px;
  margin:10px 0;
}

.emoji{
  font-size:100px;
  margin:30px 0;
}

.listen{
  background:#00b894;
  color:white;
  padding:15px 30px;
  font-size:20px;
  border:none;
  border-radius:12px;
  margin-bottom:20px;
}

.options button{
  margin:8px;
  padding:12px 20px;
  font-size:18px;
  border-radius:20px;
  border:none;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.footer{
  margin-top:40px;
  color:#999;
  font-size:14px;
}
</style>

</head>

<body>

<div class="container">

<h1>Jimmy Kids English</h1>
<p class="subtitle">Learn English with fun games 🎮</p>

<div class="score" id="score">Score: 0</div>

<div class="emoji" id="emoji">🐱</div>

<button class="listen" onclick="speak()">🔊 Listen</button>

<div class="options" id="options"></div>

<div class="footer">
Level 1 • Animals
</div>

</div>

<script>
const words = [
  { word: "cat", emoji: "🐱" },
  { word: "dog", emoji: "🐶" },
  { word: "bird", emoji: "🐦" },
  { word: "fish", emoji: "🐟" },
  { word: "rabbit", emoji: "🐰" }
];

let current;
let score = 0;

function newQuestion() {
  current = words[Math.floor(Math.random()*words.length)];
  document.getElementById("emoji").innerText = current.emoji;

  let shuffled = [...words].sort(()=>Math.random()-0.5);

  let html = "";
  shuffled.forEach(w=>{
    html += `<button onclick="check('${w.word}')">${w.word}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

function speak() {
  const u = new SpeechSynthesisUtterance(current.word);
  u.lang = "en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function check(word) {
  if(word === current.word){
    score++;
    document.getElementById("score").innerText = "Score: " + score;
  }
  newQuestion();
}

newQuestion();
</script>

</body>
</html>

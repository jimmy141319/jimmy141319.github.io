<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f4f6fb;
  text-align:center;
}

.container{
  padding:30px 15px;
}

h1{
  font-size:34px;
  color:#4a78f0;
  margin-bottom:10px;
}

.score{
  font-size:20px;
  margin-bottom:10px;
}

.emoji{
  font-size:90px;
  margin:20px 0;
}

.listen{
  background:#00b894;
  color:white;
  padding:12px 25px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin-bottom:15px;
}

.options button{
  margin:6px;
  padding:10px 16px;
  font-size:16px;
  border-radius:12px;
  border:none;
  background:white;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.feedback{
  font-size:22px;
  height:30px;
  margin-top:10px;
}

.correct{ color:#00b894; }
.wrong{ color:#d63031; }
</style>
</head>

<body>

<div class="container">

<h1>Kids English</h1>
<div class="score" id="score">Score: 0</div>

<div class="emoji" id="emoji">🐱</div>

<button class="listen" onclick="manualSpeak()">🔊 Listen</button>

<div class="feedback" id="feedback"></div>

<div class="options" id="options"></div>

</div>

<script>
const words = [
  { word:"cat", emoji:"🐱" },
  { word:"dog", emoji:"🐶" },
  { word:"bird", emoji:"🐦" },
  { word:"fish", emoji:"🐟" },
  { word:"rabbit", emoji:"🐰" }
];

let current;
let score = 0;
let unlocked = false;

// 語音（穩定版）
function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  u.rate = 0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

// 手動播放（解鎖 iPhone）
function manualSpeak(){
  unlocked = true;
  speak(current.word);
}

// 新題目
function newQuestion(){
  current = words[Math.floor(Math.random()*words.length)];
  document.getElementById("emoji").innerText = current.emoji;

  let shuffled = [...words].sort(()=>Math.random()-0.5);

  let html = "";
  shuffled.forEach(w=>{
    html += `<button onclick="check('${w.word}')">${w.word}</button>`;
  });

  document.getElementById("options").innerHTML = html;
  document.getElementById("feedback").innerText = "";

  // 自動發音（已解鎖才會跑）
  if(unlocked){
    setTimeout(()=>speak(current.word),300);
  }
}

// 檢查答案
function check(word){
  if(word === current.word){
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("feedback").innerText = "Correct!";
    document.getElementById("feedback").className = "feedback correct";
  }else{
    document.getElementById("feedback").innerText = "Try again";
    document.getElementById("feedback").className = "feedback wrong";
    speak(current.word);
    return;
  }

  setTimeout(newQuestion, 600);
}

// 初始化
newQuestion();
</script>

</body>
</html>

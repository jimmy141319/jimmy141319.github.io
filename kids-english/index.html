<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English V17</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#eef1f7;
  text-align:center;
}
h1{
  color:#4a78f0;
  font-size:36px;
}
.box{
  display:inline-block;
  background:white;
  padding:10px 14px;
  border-radius:16px;
  margin:4px;
  font-weight:bold;
}
button{
  border:none;
  border-radius:16px;
  padding:14px;
  margin:8px;
  font-size:18px;
  width:80%;
  max-width:320px;
}
.option{
  background:white;
}
.correct{
  background:#11b35c;
  color:white;
}
.wrong{
  background:#d84b4b;
  color:white;
}
.big{
  font-size:90px;
  margin:20px;
}
.mode{
  background:white;
  color:#4a78f0;
}
.active{
  background:#4a78f0;
  color:white;
}
.hint{
  font-size:22px;
  min-height:30px;
}
</style>
</head>

<body>

<h1>Jimmy Kids English</h1>

<div class="box" id="score">Score:0</div>
<div class="box" id="streak">Streak:0</div>

<br>

<button class="mode active" onclick="setMode('word')" id="m1">Word</button>
<button class="mode" onclick="setMode('sentence')" id="m2">Sentence</button>
<button class="mode" onclick="setMode('listen')" id="m3">Listening</button>

<div class="big" id="display">🐶</div>
<div class="hint" id="hint"></div>
<div id="options"></div>

<script>
const words = [
"dog","cat","fish","rabbit","lion","tiger","frog","cow","pig","sheep",
"chicken","duck","monkey","horse","bird",
"apple","banana","orange","grape","cake","bread",
"car","bus","bike","train","plane",
"book","pen","pencil","bag","chair","table",
"sun","moon","star","rain","cloud",
"red","blue","green","yellow","black","white"
];

const emojiMap = {
dog:"🐶",cat:"🐱",fish:"🐟",rabbit:"🐰",lion:"🦁",tiger:"🐯",frog:"🐸",cow:"🐮",
pig:"🐷",sheep:"🐑",chicken:"🐔",duck:"🦆",monkey:"🐵",horse:"🐴",bird:"🐦",
apple:"🍎",banana:"🍌",orange:"🍊",grape:"🍇",cake:"🍰",bread:"🍞",
car:"🚗",bus:"🚌",bike:"🚲",train:"🚆",plane:"✈️",
book:"📘",pen:"🖊️",pencil:"✏️",bag:"🎒",chair:"🪑",table:"🪑",
sun:"☀️",moon:"🌙",star:"⭐",rain:"🌧️",cloud:"☁️",
red:"🟥",blue:"🟦",green:"🟩",yellow:"🟨",black:"⬛",white:"⬜"
};

let mode="word";
let current="";
let score=0;
let streak=0;

function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function setMode(m){
  mode=m;
  m1.classList.remove("active");
  m2.classList.remove("active");
  m3.classList.remove("active");

  if(m==="word") m1.classList.add("active");
  if(m==="sentence") m2.classList.add("active");
  if(m==="listen") m3.classList.add("active");

  next();
}

function next(){
  current = words[Math.floor(Math.random()*words.length)];

  hint.innerText="";
  options.innerHTML="";

  if(mode==="word"){
    display.innerText=emojiMap[current];
    buildWord();
  }

  if(mode==="sentence"){
    display.innerText=emojiMap[current];
    buildSentence();
  }

  if(mode==="listen"){
    display.innerText="🎧";
    buildListen();
  }
}

function buildWord(){
  let arr=[current];

  while(arr.length<4){
    let w=words[Math.floor(Math.random()*words.length)];
    if(!arr.includes(w)) arr.push(w);
  }

  arr.sort(()=>Math.random()-0.5);

  arr.forEach(a=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerText=a;
    b.onclick=()=>selectWord(a,b);
    options.appendChild(b);
  });
}

function buildSentence(){
  const correct="This is a "+current;
  let arr=[correct];

  while(arr.length<3){
    let w=words[Math.floor(Math.random()*words.length)];
    let s="This is a "+w;
    if(!arr.includes(s)) arr.push(s);
  }

  arr.sort(()=>Math.random()-0.5);

  arr.forEach(a=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerText=a;
    b.onclick=()=>selectSentence(a,b,correct);
    options.appendChild(b);
  });
}

function buildListen(){
  const correct=current;
  let arr=[correct];

  while(arr.length<4){
    let w=words[Math.floor(Math.random()*words.length)];
    if(!arr.includes(w)) arr.push(w);
  }

  arr.sort(()=>Math.random()-0.5);

  arr.forEach(a=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerText=a;
    b.onclick=()=>selectWord(a,b);
    options.appendChild(b);
  });

  // 不自動播放（避免iPhone被擋）
}

function selectWord(a,b){
  if(a===current){
    b.classList.add("correct");
    speak(a);

    score++;
    streak++;

    feedback();

    setTimeout(next,300);
  }else{
    b.classList.add("wrong");
    streak=0;
    hint.innerText="❌";
  }
  update();
}

function selectSentence(a,b,correct){
  if(a===correct){
    b.classList.add("correct");
    speak(correct);

    score++;
    streak++;

    feedback();

    setTimeout(next,300);
  }else{
    b.classList.add("wrong");
    streak=0;
    hint.innerText="❌";
  }
  update();
}

function feedback(){
  if(streak>=10) hint.innerText="🔥 Amazing!";
  else if(streak>=5) hint.innerText="💪 Great!";
  else if(streak>=3) hint.innerText="👍 Nice!";
  else hint.innerText="✅";
}

function update(){
  scoreEl.innerText="Score:"+score;
  streakEl.innerText="Streak:"+streak;
}

const scoreEl=document.getElementById("score");
const streakEl=document.getElementById("streak");

next();
</script>

</body>
</html>

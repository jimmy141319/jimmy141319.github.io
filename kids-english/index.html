<script>
function choose(clickedWord){
  if(busy) return;
  busy = true;

  if(clickedWord === current[0]){
    // ✅ 正確

    document.getElementById("hint").innerText = "✅ Correct!";
    
    // 👉 發音（不等待）
    speak(current[0]);

    // 👉 直接跳下一題（關鍵）
    score++;
    streak++;
    if(streak > best) best = streak;

    if(score % 10 === 0){
      level++;
      if(level >= levels.length){
        update();
        alert("🎉 Finished!");
        busy = false;
        return;
      }
      resetQueue();
    }

    update();
    build(); // 👉 立刻跳
    busy = false;

  }else{
    // ❌ 錯誤
    document.getElementById("hint").innerText = "❌ Wrong";
    streak = 0;
    review.push(current);
    update();
    busy = false;
  }
}
</script>

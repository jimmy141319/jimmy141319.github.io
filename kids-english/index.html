<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English V6</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef1f7;text-align:center;color:#1f2430;}
.wrap{max-width:900px;margin:0 auto;padding:24px 16px 48px;}
h1{margin:10px 0 8px;font-size:clamp(40px,8vw,76px);line-height:1.04;color:#4a78f0;font-weight:800;}
.subtitle{font-size:18px;color:#6f7688;margin-bottom:18px;}
.topbar{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
.pill{background:#fff;box-shadow:0 8px 24px rgba(0,0,0,.08);border-radius:999px;padding:12px 18px;min-width:120px;font-size:18px;font-weight:800;}
.emoji{
  font-size:112px;min-height:130px;display:flex;align-items:center;justify-content:center;
  margin:24px auto 8px;cursor:pointer;user-select:none;width:220px;height:180px;border-radius:28px;
}
.emoji:active{transform:scale(0.98);}
.btn-row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:14px 0 10px;}
.btn{border:none;border-radius:20px;padding:15px 24px;font-size:20px;font-weight:800;color:#fff;background:#4a78f0;box-shadow:0 8px 24px rgba(0,0,0,.08);}
.feedback{min-height:36px;margin:10px 0 6px;font-size:28px;font-weight:900;}
.feedback.correct{color:#11b35c;}
.feedback.wrong{color:#d84b4b;}
.hint{min-height:28px;color:#6f7688;font-size:17px;margin-bottom:18px;}
.options{display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:12px;}
.option{min-width:128px;padding:14px 18px;border:none;border-radius:20px;background:#fff;color:#4a78f0;font-size:20px;font-weight:800;box-shadow:0 8px 24px rgba(0,0,0,.08);}
.option:disabled{opacity:.7;}
.panel{margin:28px auto 0;max-width:700px;background:rgba(255,255,255,.72);border-radius:26px;padding:18px 16px;box-shadow:0 8px 24px rgba(0,0,0,.08);}
.panel-title{font-size:18px;font-weight:800;margin-bottom:6px;}
.panel-text{color:#6f7688;font-size:16px;}
.win-box{margin:26px auto 0;max-width:700px;background:#fff;border-radius:28px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:28px 18px;}
.win-title{font-size:38px;font-weight:900;color:#11b35c;margin-bottom:8px;}
.win-text{font-size:19px;color:#4d5568;margin-bottom:16px;}
.hide{display:none;}
@media (max-width:480px){
  .pill{min-width:108px;font-size:16px;}
  .option{min-width:110px;font-size:18px;}
  .btn{font-size:18px;}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Jimmy Kids English</h1>
  <div class="subtitle" id="subtitle">Level 1 · Animals</div>

  <div class="topbar">
    <div class="pill" id="score">Score: 0</div>
    <div class="pill" id="streak">Streak: 0</div>
    <div class="pill" id="best">Best: 0</div>
    <div class="pill" id="levelPill">Level: 1</div>
  </div>

  <div class="emoji" id="emoji" onclick="repeatQuestion()">❓</div>

  <div class="btn-row">
    <button class="btn" id="speedBtn" onclick="toggleSpeed()">🐢 Slow</button>
    <button class="btn" onclick="restartGame()">↺ Restart</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="hint" id="hint">Listen, then tap the correct English word.</div>

  <div class="options" id="options"></div>

  <div class="panel">
    <div class="panel-title" id="panelTitle">Level Goal: 15 points</div>
    <div class="panel-text">Tap the picture to hear the word again.</div>
  </div>

  <div class="win-box hide" id="winBox">
    <div class="win-title">🎉 You Win!</div>
    <div class="win-text">Amazing! You finished all 3 levels.</div>
    <button class="btn" onclick="restartGame()">Play Again</button>
  </div>
</div>

<script>
const levels = [
{
name:"Animals",
goal:15,
words:[
["cat","🐱"],["dog","🐶"],["bird","🐦"],["fish","🐟"],["rabbit","🐰"],
["lion","🦁"],["tiger","🐯"],["monkey","🐵"],["frog","🐸"],["pig","🐷"],
["cow","🐮"],["horse","🐴"],["sheep","🐑"],["duck","🦆"],["chicken","🐔"],
["elephant","🐘"],["bear","🐻"],["panda","🐼"],["fox","🦊"],["wolf","🐺"],
["deer","🦌"],["zebra","🦓"],["giraffe","🦒"],["kangaroo","🦘"],["koala","🐨"],
["mouse","🐭"],["hamster","🐹"],["goat","🐐"],["donkey","🫏"],["snake","🐍"]
]
},
{
name:"Food",
goal:15,
words:[
["apple","🍎"],["banana","🍌"],["orange","🍊"],["grape","🍇"],["watermelon","🍉"],
["bread","🍞"],["cake","🍰"],["pizza","🍕"],["rice","🍚"],["ice cream","🍦"],
["milk","🥛"],["egg","🥚"],["cheese","🧀"],["noodles","🍜"],["burger","🍔"],
["hot dog","🌭"],["fries","🍟"],["donut","🍩"],["cookie","🍪"],["chocolate","🍫"],
["sandwich","🥪"],["salad","🥗"],["soup","🍲"],["pancake","🥞"],["steak","🥩"],
["shrimp","🍤"],["corn","🌽"],["carrot","🥕"],["potato","🥔"],["fish","🍣"]
]
},
{
name:"Daily Things",
goal:15,
words:[
["car","🚗"],["bus","🚌"],["book","📘"],["phone","📱"],["ball","⚽"],
["chair","🪑"],["clock","🕒"],["house","🏠"],["star","⭐"],["sun","☀️"],
["moon","🌙"],["bed","🛏️"],["door","🚪"],["window","🪟"],["bag","🎒"],
["pen","✏️"],["cup","☕"],["bottle","🍼"],["computer","💻"],["tv","📺"],
["lamp","💡"],["key","🔑"],["bike","🚲"],["train","🚆"],["airplane","✈️"],
["ship","🚢"],["camera","📷"],["watch","⌚"],["table","🪑"],["pencil","✏️"]
]
}
];

let level = 0;
let score = 0;
let streak = 0;
let best = 0;
let current = null;
let normalQueue = [];
let reviewQueue = [];
let speed = "slow";
let locked = false;
let finished = false;

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

function speak(word){
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = speed === "slow" ? 0.7 : 1.0;
  u.pitch = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function toggleSpeed(){
  speed = speed === "slow" ? "normal" : "slow";
  document.getElementById("speedBtn").innerText = speed === "slow" ? "🐢 Slow" : "⚡ Normal";
  document.getElementById("hint").innerText = speed === "slow"
    ? "Slow speed selected."
    : "Normal speed selected.";
  if(current && !finished){
    speak(current[0]);
  }
}

function resetQueue(){
  normalQueue = shuffle([...levels[level].words]);
  reviewQueue = [];
}

function nextWord(){
  if(reviewQueue.length > 0) return reviewQueue.shift();
  if(normalQueue.length === 0) resetQueue();
  return normalQueue.shift();
}

function buildOptions(){
  const pool = levels[level].words.filter(x => x[0] !== current[0]);
  let opts = shuffle(pool).slice(0,4).map(x => x[0]);
  opts.push(current[0]);
  opts = shuffle(opts);

  const box = document.getElementById("options");
  box.innerHTML = "";

  opts.forEach(word=>{
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = word;
    btn.onclick = ()=>choose(word);
    box.appendChild(btn);
  });
}

function update(){
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
  document.getElementById("best").innerText = "Best: " + best;
  document.getElementById("levelPill").innerText = "Level: " + (level + 1);
  document.getElementById("subtitle").innerText = "Level " + (level + 1) + " · " + levels[level].name;
  document.getElementById("panelTitle").innerText = "Level Goal: " + levels[level].goal + " points";
}

function setFeedback(text, cls=""){
  const el = document.getElementById("feedback");
  el.innerText = text;
  el.className = "feedback " + cls;
}

function newQuestion(){
  if(finished) return;
  locked = false;
  setFeedback("");
  document.getElementById("hint").innerText = "Listen, then tap the correct English word.";

  current = nextWord();
  document.getElementById("emoji").innerText = current[1];
  buildOptions();

  setTimeout(()=>speak(current[0]), 250);
}

function repeatQuestion(){
  if(current && !finished){
    speak(current[0]);
    document.getElementById("hint").innerText = "Repeated.";
  }
}

function wrongToReview(){
  if(!reviewQueue.some(x => x[0] === current[0])){
    reviewQueue.push(current);
  }
}

function choose(word){
  if(locked || finished || !current) return;

  if(word === current[0]){
    locked = true;
    speak(word);
    score++;
    streak++;
    if(streak > best) best = streak;
    update();
    setFeedback("🎉 Correct!", "correct");
    document.getElementById("hint").innerText = word.toUpperCase();

    if(score >= (level + 1) * levels[level].goal){
      setTimeout(nextLevel, 700);
    } else {
      setTimeout(newQuestion, 700);
    }
  } else {
    streak = 0;
    update();
    setFeedback("❌ Try again", "wrong");
    document.getElementById("hint").innerText = "Listen again and try one more time.";
    speak(current[0]);
    wrongToReview();
  }
}

function nextLevel(){
  if(level < levels.length - 1){
    level++;
    resetQueue();
    update();
    setFeedback("🎉 Level Up!", "correct");
    document.getElementById("hint").innerText = "Welcome to " + levels[level].name + "!";
    setTimeout(newQuestion, 900);
  } else {
    finished = true;
    document.getElementById("winBox").classList.remove("hide");
    document.getElementById("options").innerHTML = "";
    document.getElementById("emoji").innerText = "🏆";
    setFeedback("Excellent!", "correct");
    document.getElementById("hint").innerText = "You finished all levels.";
  }
}

function restartGame(){
  speechSynthesis.cancel();
  level = 0;
  score = 0;
  streak = 0;
  best = 0;
  current = null;
  normalQueue = [];
  reviewQueue = [];
  speed = "slow";
  locked = false;
  finished = false;

  document.getElementById("speedBtn").innerText = "🐢 Slow";
  document.getElementById("winBox").classList.add("hide");
  document.getElementById("emoji").innerText = "❓";
  document.getElementById("options").innerHTML = "";
  document.getElementById("hint").innerText = "Listen, then tap the correct English word.";
  setFeedback("");
  resetQueue();
  update();
  newQuestion();
}

resetQueue();
update();
newQuestion();
</script>
</body>
</html>

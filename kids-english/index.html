<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English V18</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#eef1f7;
  text-align:center;
}
h1{color:#4a78f0;}

.box{
  display:inline-block;
  background:white;
  padding:10px 14px;
  border-radius:14px;
  margin:4px;
  font-weight:bold;
}

button{
  border:none;
  border-radius:14px;
  padding:14px;
  margin:6px;
  width:80%;
  max-width:320px;
  font-size:18px;
}

.mode{background:white;color:#4a78f0;}
.active{background:#4a78f0;color:white;}

.correct{background:#11b35c;color:white;}
.wrong{background:#d84b4b;color:white;}

.big{font-size:80px;margin:20px;}

.progress{
  width:80%;
  max-width:300px;
  margin:10px auto;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}
.bar{
  height:10px;
  background:#4a78f0;
  width:0%;
}

</style>
</head>

<body>

<h1>Jimmy Kids English</h1>

<div class="box" id="score">Score:0</div>
<div class="box" id="streak">Streak:0</div>
<div class="box" id="level">Level:1</div>

<br>

<button class="mode active" onclick="setMode('word')" id="m1">Word</button>
<button class="mode" onclick="setMode('sentence')" id="m2">Sentence</button>
<button class="mode" onclick="setMode('listen')" id="m3">Listening</button>

<div class="big" id="display">🐶</div>

<div class="progress">
  <div class="bar" id="bar"></div>
</div>

<div id="options"></div>

<button onclick="speakCurrent()">🔊 Replay</button>

<script>

// ===== LEVELS（關鍵）=====
const levels = [
{
name:"Animals",
data:[
{w:"dog",e:"🐶"},
{w:"cat",e:"🐱"},
{w:"lion",e:"🦁"},
{w:"tiger",e:"🐯"},
{w:"rabbit",e:"🐰"},
{w:"cow",e:"🐮"},
{w:"pig",e:"🐷"},
{w:"sheep",e:"🐑"}
]
},
{
name:"Food",
data:[
{w:"apple",e:"🍎"},
{w:"banana",e:"🍌"},
{w:"cake",e:"🍰"},
{w:"bread",e:"🍞"}
]
},
{
name:"Color",
data:[
{w:"red",e:"🟥"},
{w:"blue",e:"🟦"},
{w:"green",e:"🟩"},
{w:"yellow",e:"🟨"}
]
}
];

let levelIndex=0;
let current="";
let score=0;
let streak=0;
let progress=0;
let mode="word";

// ===== MODE =====
function setMode(m){
mode=m;
m1.classList.remove("active");
m2.classList.remove("active");
m3.classList.remove("active");

if(m==="word") m1.classList.add("active");
if(m==="sentence") m2.classList.add("active");
if(m==="listen") m3.classList.add("active");

next();
}

// ===== SPEAK =====
function speak(text){
const u=new SpeechSynthesisUtterance(text);
u.lang="en-US";
speechSynthesis.cancel();
speechSynthesis.speak(u);
}

function speakCurrent(){
if(mode==="sentence"){
speak("This is a "+current);
}else{
speak(current);
}
}

// ===== NEXT =====
function next(){

const lv=levels[levelIndex].data;
const item=lv[Math.floor(Math.random()*lv.length)];

current=item.w;
display.innerText=item.e;

options.innerHTML="";

if(mode==="word") buildWord(lv);
if(mode==="sentence") buildSentence(lv);
if(mode==="listen") buildListen(lv);

updateUI();
}

// ===== BUILD =====
function buildWord(lv){

let arr=[current];

while(arr.length<4){
let w=lv[Math.floor(Math.random()*lv.length)].w;
if(!arr.includes(w)) arr.push(w);
}

arr.sort(()=>Math.random()-0.5);

arr.forEach(a=>{
let b=document.createElement("button");
b.innerText=a;
b.onclick=()=>check(a,b);
options.appendChild(b);
});
}

function buildSentence(lv){

const correct="This is a "+current;

let arr=[correct];

while(arr.length<3){
let w=lv[Math.floor(Math.random()*lv.length)].w;
let s="This is a "+w;
if(!arr.includes(s)) arr.push(s);
}

arr.sort(()=>Math.random()-0.5);

arr.forEach(a=>{
let b=document.createElement("button");
b.innerText=a;
b.onclick=()=>checkSentence(a,b,correct);
options.appendChild(b);
});
}

function buildListen(lv){
buildWord(lv);
}

// ===== CHECK =====
function check(a,b){

if(a===current){
b.classList.add("correct");
speak(a);
success();
}else{
b.classList.add("wrong");
fail();
}

updateUI();
}

function checkSentence(a,b,correct){

if(a===correct){
b.classList.add("correct");
speak(correct);
success();
}else{
b.classList.add("wrong");
fail();
}

updateUI();
}

// ===== LOGIC =====
function success(){
score++;
streak++;
progress++;

if(progress>=5){
levelIndex++;
progress=0;

if(levelIndex>=levels.length){
levelIndex=0;
}
}

setTimeout(next,300);
}

function fail(){
streak=0;
}

// ===== UI =====
function updateUI(){
scoreEl.innerText="Score:"+score;
streakEl.innerText="Streak:"+streak;
levelEl.innerText="Level:"+(levelIndex+1);

bar.style.width=(progress*20)+"%";
}

const scoreEl=document.getElementById("score");
const streakEl=document.getElementById("streak");
const levelEl=document.getElementById("level");

next();

</script>

</body>
</html>

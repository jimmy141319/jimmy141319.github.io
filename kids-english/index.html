<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef1f7;
  text-align:center;
}

h1{
  font-size:60px;
  color:#4a78f0;
  margin:20px 0;
}

.subtitle{
  color:#666;
  margin-bottom:20px;
}

.top{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.box{
  background:white;
  padding:12px 20px;
  border-radius:20px;
  font-weight:bold;
}

.stage{
  transition:opacity 0.22s ease, transform 0.22s ease;
  opacity:1;
  transform:translateY(0);
}

.stage.switching{
  opacity:0;
  transform:translateY(8px);
}

.emoji{
  font-size:100px;
  margin:30px 0;
  min-height:120px;
}

button{
  border:none;
  border-radius:20px;
  padding:14px 24px;
  font-size:20px;
  margin:8px;
  transition:all 0.18s ease;
}

.option{
  background:white;
  color:#4a78f0;
  font-weight:bold;
  min-width:120px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
}

.option.correct{
  background:#11b35c;
  color:white;
  transform:scale(1.05);
}

.option.wrong{
  background:#d84b4b;
  color:white;
  transform:scale(1.05);
}

.option:disabled{
  opacity:0.95;
}

.btn{
  background:#4a78f0;
  color:white;
}

.hint{
  margin:10px;
  font-size:26px;
  font-weight:bold;
  min-height:40px;
}
</style>
</head>

<body>

<h1>Jimmy Kids English</h1>
<div class="subtitle" id="subtitle"></div>

<div class="top">
  <div class="box" id="score">Score: 0</div>
  <div class="box" id="streak">Streak: 0</div>
  <div class="box" id="best">Best: 0</div>
  <div class="box" id="level">Level: 1</div>
</div>

<div id="stage" class="stage">
  <div class="emoji" id="emoji">❓</div>

  <button class="btn" onclick="restart()">↺ Restart</button>

  <div class="hint" id="hint"></div>

  <div id="options"></div>
</div>

<script>
const levels = [
{
name:"Animals",
words:[
["cat","🐱"],["dog","🐶"],["bird","🐦"],["fish","🐟"],["rabbit","🐰"],
["lion","🦁"],["tiger","🐯"],["monkey","🐵"],["frog","🐸"],["pig","🐷"],
["cow","🐮"],["horse","🐴"],["sheep","🐑"],["duck","🦆"],["chicken","🐔"]
]
},
{
name:"Food",
words:[
["apple","🍎"],["banana","🍌"],["orange","🍊"],["grape","🍇"],["bread","🍞"],
["cake","🍰"],["pizza","🍕"],["rice","🍚"],["milk","🥛"],["egg","🥚"],
["burger","🍔"],["fries","🍟"],["donut","🍩"],["cookie","🍪"],["chocolate","🍫"]
]
},
{
name:"Daily",
words:[
["car","🚗"],["bus","🚌"],["book","📘"],["phone","📱"],["ball","⚽"],
["chair","🪑"],["clock","🕒"],["house","🏠"],["star","⭐"],["sun","☀️"],
["moon","🌙"],["bed","🛏️"],["door","🚪"],["window","🪟"],["bag","🎒"]
]
}
];

let level = 0;
let score = 0;
let streak = 0;
let best = 0;
let queue = [];
let review = [];
let current = null;
let lock = false;

function shuffle(a){
  return [...a].sort(()=>Math.random()-0.5);
}

function speak(word, callback){
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.8;

  let done = false;
  function finish(){
    if(done) return;
    done = true;
    if(callback) callback();
  }

  u.onend = finish;
  u.onerror = finish;

  speechSynthesis.cancel();
  speechSynthesis.speak(u);

  setTimeout(finish, Math.max(700, word.length * 180));
}

function resetQueue(){
  queue = shuffle(levels[level].words);
  review = [];
}

function nextWord(){
  if(review.length > 0) return review.shift();
  if(queue.length === 0) resetQueue();
  return queue.shift();
}

function switchToNextQuestion(){
  const stage = document.getElementById("stage");
  stage.classList.add("switching");

  setTimeout(()=>{
    build();
    stage.classList.remove("switching");
    lock = false;
  }, 220);
}

function build(){
  current = nextWord();
  document.getElementById("emoji").innerText = current[1];

  let opts = shuffle(levels[level].words).slice(0,4).map(x=>x[0]);
  if(!opts.includes(current[0])) opts[0] = current[0];

  const box = document.getElementById("options");
  box.innerHTML = "";

  shuffle(opts).forEach(word=>{
    const b = document.createElement("button");
    b.className = "option";
    b.innerText = word;
    b.onclick = ()=>choose(word,b);
    box.appendChild(b);
  });

  document.getElementById("hint").innerText = "";
}

function setAllDisabled(disabled){
  document.querySelectorAll(".option").forEach(btn=>{
    btn.disabled = disabled;
  });
}

function choose(word, button){
  if(lock) return;
  lock = true;
  setAllDisabled(true);

  if(word === current[0]){
    button.classList.add("correct");
    document.getElementById("hint").innerText = "✅ Correct";

    score++;
    streak++;
    if(streak > best) best = streak;
    update();

    speak(current[0], ()=>{
      if(score % 10 === 0){
        level++;
        if(level >= levels.length){
          alert("🎉 Finished!");
          lock = false;
          return;
        }
        resetQueue();
      }

      switchToNextQuestion();
    });

  }else{
    button.classList.add("wrong");
    document.getElementById("hint").innerText = "❌ Wrong";

    streak = 0;
    review.push(current);
    update();

    setTimeout(()=>{
      setAllDisabled(false);
      lock = false;
    }, 500);
  }
}

function update(){
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
  document.getElementById("best").innerText = "Best: " + best;
  document.getElementById("level").innerText = "Level: " + (level + 1);
  document.getElementById("subtitle").innerText =
    "Level " + (level + 1) + " · " + levels[level].name;
}

function restart(){
  level = 0;
  score = 0;
  streak = 0;
  best = 0;
  lock = false;
  speechSynthesis.cancel();
  resetQueue();
  update();
  build();
}

resetQueue();
update();
build();
</script>

</body>
</html>

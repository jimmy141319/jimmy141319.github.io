<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef1f7;text-align:center;}
h1{font-size:60px;color:#4a78f0;margin:20px 0;}
.subtitle{color:#666;margin-bottom:20px;}
.top{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.box{background:white;padding:12px 20px;border-radius:20px;font-weight:bold;}
.emoji{font-size:100px;margin:30px 0;}
button{border:none;border-radius:20px;padding:14px 24px;font-size:20px;margin:8px;}
.option{background:white;color:#4a78f0;font-weight:bold;}
.btn{background:#4a78f0;color:white;}
</style>
</head>

<body>

<h1>Jimmy Kids English</h1>
<div class="subtitle" id="subtitle"></div>

<div class="top">
  <div class="box" id="score">Score: 0</div>
  <div class="box" id="streak">Streak: 0</div>
  <div class="box" id="best">Best: 0</div>
  <div class="box" id="level">Level: 1</div>
</div>

<div class="emoji" id="emoji">❓</div>

<button class="btn" onclick="restart()">↺ Restart</button>

<div id="hint" style="margin:10px;color:#666"></div>

<div id="options"></div>

<script>
const levels = [
{
name:"Animals",
words:[
["cat","🐱"],["dog","🐶"],["bird","🐦"],["fish","🐟"],["rabbit","🐰"],
["lion","🦁"],["tiger","🐯"],["monkey","🐵"],["frog","🐸"],["pig","🐷"],
["cow","🐮"],["horse","🐴"],["sheep","🐑"],["duck","🦆"],["chicken","🐔"]
]
},
{
name:"Food",
words:[
["apple","🍎"],["banana","🍌"],["orange","🍊"],["grape","🍇"],["bread","🍞"],
["cake","🍰"],["pizza","🍕"],["rice","🍚"],["milk","🥛"],["egg","🥚"],
["burger","🍔"],["fries","🍟"],["donut","🍩"],["cookie","🍪"],["chocolate","🍫"]
]
},
{
name:"Daily",
words:[
["car","🚗"],["bus","🚌"],["book","📘"],["phone","📱"],["ball","⚽"],
["chair","🪑"],["clock","🕒"],["house","🏠"],["star","⭐"],["sun","☀️"],
["moon","🌙"],["bed","🛏️"],["door","🚪"],["window","🪟"],["bag","🎒"]
]
}
];

let level = 0;
let score = 0;
let streak = 0;
let best = 0;
let queue = [];
let review = [];
let current = null;
let busy = false;

function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

function speakThen(word, after){
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.8;

  let finished = false;
  function done(){
    if(finished) return;
    finished = true;
    if(after) after();
  }

  u.onend = done;
  u.onerror = done;

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);

  // Safari / iPhone 保底
  setTimeout(done, Math.max(700, word.length * 180));
}

function resetQueue(){
  queue = shuffle(levels[level].words);
  review = [];
}

function nextWord(){
  if(review.length > 0) return review.shift();
  if(queue.length === 0) resetQueue();
  return queue.shift();
}

function build(){
  current = nextWord();
  document.getElementById("emoji").innerText = current[1];

  let opts = shuffle(levels[level].words).slice(0,4).map(x=>x[0]);
  if(!opts.includes(current[0])) opts[0] = current[0];

  const box = document.getElementById("options");
  box.innerHTML = "";

  shuffle(opts).forEach(word=>{
    const b = document.createElement("button");
    b.className = "option";
    b.innerText = word;
    b.onclick = ()=>choose(word);
    box.appendChild(b);
  });

  document.getElementById("hint").innerText = "Choose the correct word";
}

function choose(clickedWord){
  if(busy || !current) return;
  busy = true;

  // 先鎖住，避免連點
  const buttons = document.querySelectorAll(".option");
  buttons.forEach(btn => btn.disabled = true);

  // 第一步：一定先念「你點的字」
  speakThen(clickedWord, function(){

    // 第二步：發音結束後才判斷
    if(clickedWord === current[0]){
      score++;
      streak++;
      if(streak > best) best = streak;

      if(score % 10 === 0){
        level++;
        if(level >= levels.length){
          update();
          alert("🎉 Finished!");
          busy = false;
          return;
        }
        resetQueue();
      }

      update();
      build();
      busy = false;

    }else{
      streak = 0;
      review.push(current);
      update();

      document.getElementById("hint").innerText = "Correct answer: " + current[0];

      // 第三步：再念正確答案
      speakThen(current[0], function(){
        // 錯題不跳題，停留原題，重新開放按鈕
        const retryButtons = document.querySelectorAll(".option");
        retryButtons.forEach(btn => btn.disabled = false);
        busy = false;
      });
    }
  });
}

function update(){
  document.getElementById("score").innerText = "Score: " + score;
  document.getElementById("streak").innerText = "Streak: " + streak;
  document.getElementById("best").innerText = "Best: " + best;
  document.getElementById("level").innerText = "Level: " + (level + 1);
  document.getElementById("subtitle").innerText =
    "Level " + (level + 1) + " · " + levels[level].name;
}

function restart(){
  level = 0;
  score = 0;
  streak = 0;
  best = 0;
  busy = false;
  window.speechSynthesis.cancel();
  resetQueue();
  update();
  build();
}

resetQueue();
update();
build();
</script>

</body>
</html>

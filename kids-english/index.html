<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English Pro</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1f7;text-align:center}
h1{color:#4a78f0;margin:10px 0}
.row{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:10px}
.pill,.btn{padding:10px 16px;border-radius:16px;border:none;font-weight:bold}
.pill{background:#fff}
.btn{background:#64748b;color:#fff}
.active{background:#4a78f0;color:#fff}
.option{margin:10px auto;padding:16px;border-radius:16px;background:#fff;width:80%;font-size:20px}
.correct{background:#12b76a;color:#fff}
.wrong{background:#ef4444;color:#fff}
.stage{background:#fff;margin:10px;padding:20px;border-radius:20px}
</style>
</head>

<body>

<h1>Jimmy Kids English</h1>

<div class="row">
<div class="pill" id="score">Score:0</div>
<div class="pill" id="streak">Streak:0</div>
<div class="pill" id="level">Level:1</div>
</div>

<div class="row" id="levels"></div>

<div class="row">
<button class="pill active" onclick="setMode('word')" id="wordBtn">Word</button>
<button class="pill" onclick="setMode('sentence')" id="sentenceBtn">Sentence</button>
<button class="btn" onclick="replay()">🔊</button>
<button class="btn" onclick="restart()">↺</button>
</div>

<div>
<button onclick="buy()" style="background:#10b981;color:#fff;padding:12px 20px;border:none;border-radius:14px;font-size:16px">
🔓 Unlock Full Version
</button>
</div>

<div class="stage">
<div id="emoji" style="font-size:80px">🐶</div>
<div id="options"></div>
</div>

<script>
const LEVELS=[
{name:"Animals",items:["dog","cat","lion","tiger","cow","pig","sheep","horse","duck","chicken"]},
{name:"Food",items:["apple","banana","cake","pizza","milk","egg"]},
{name:"School",items:["book","pen","bag","chair","desk"]},
{name:"Daily",items:["car","bus","phone","ball","bed"]},
{name:"Colors",items:["red","blue","green","yellow"]}
];

let isPro=localStorage.getItem("pro")=="yes";

function buy(){
window.open("https://gumroad.com"); //換成你的連結
}

function unlock(){
let code=prompt("Enter code");
if(code=="jimmy123"){
localStorage.setItem("pro","yes");
alert("Unlocked!");
location.reload();
}else{
alert("Wrong code");
}
}

document.querySelector("button").onclick=unlock;

let state={
level:0,
score:0,
streak:0,
mode:"word",
current:null
};

function renderLevels(){
let el=document.getElementById("levels");
el.innerHTML="";
LEVELS.forEach((l,i)=>{
let b=document.createElement("button");
b.innerText="L"+(i+1);
b.className="pill";
if(i==state.level)b.classList.add("active");
b.onclick=()=>{
if(!isPro && i>0){alert("Unlock to continue");return;}
state.level=i;
next();
};
el.appendChild(b);
});
}

function setMode(m){
state.mode=m;
document.getElementById("wordBtn").classList.toggle("active",m=="word");
document.getElementById("sentenceBtn").classList.toggle("active",m=="sentence");
next();
}

function next(){
let list=LEVELS[state.level].items;
state.current=list[Math.floor(Math.random()*list.length)];

document.getElementById("emoji").innerText="❓";

let correct=state.current;

let opts=[correct];
while(opts.length<4){
let r=list[Math.floor(Math.random()*list.length)];
if(!opts.includes(r))opts.push(r);
}
opts.sort(()=>Math.random()-0.5);

let box=document.getElementById("options");
box.innerHTML="";

opts.forEach(o=>{
let btn=document.createElement("div");
btn.className="option";
btn.innerText=state.mode=="word"?o:"This is a "+o;
btn.onclick=()=>check(o,correct,btn);
box.appendChild(btn);
});

update();
}

function check(sel,correct,btn){
if(sel==correct){
btn.classList.add("correct");
state.score++;
state.streak++;
speak(correct);
setTimeout(next,400);
}else{
btn.classList.add("wrong");
state.streak=0;
setTimeout(()=>btn.classList.remove("wrong"),300);
}
update();
}

function speak(t){
let u=new SpeechSynthesisUtterance(t);
u.lang="en-US";
speechSynthesis.speak(u);
}

function replay(){
speak(state.current);
}

function restart(){
state.score=0;
state.streak=0;
state.level=0;
next();
}

function update(){
document.getElementById("score").innerText="Score:"+state.score;
document.getElementById("streak").innerText="Streak:"+state.streak;
document.getElementById("level").innerText="Level:"+(state.level+1);
}

renderLevels();
next();
</script>

</body>
</html>

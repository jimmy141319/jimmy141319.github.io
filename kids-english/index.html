<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<style>
body{margin:0;font-family:-apple-system;background:#eef1f7;text-align:center;}
h1{font-size:60px;color:#4a78f0;margin:20px 0;}
.subtitle{color:#666;margin-bottom:20px;}
.top{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;}
.box{background:white;padding:12px 20px;border-radius:20px;font-weight:bold;}

.stage{transition:0.2s;opacity:1}
.stage.hide{opacity:0;transform:translateY(8px)}

.emoji{font-size:100px;margin:30px 0;min-height:120px;}

button{border:none;border-radius:20px;padding:14px 24px;font-size:20px;margin:8px;}
.option{background:white;color:#4a78f0;font-weight:bold;}
.option.correct{background:#11b35c;color:white;}
.option.wrong{background:#d84b4b;color:white;}
.btn{background:#4a78f0;color:white;}

.hint{font-size:26px;margin:10px;min-height:40px;}
</style>
</head>

<body>

<h1>Jimmy Kids English</h1>
<div class="subtitle" id="subtitle"></div>

<div class="top">
<div class="box" id="score">Score: 0</div>
<div class="box" id="streak">Streak: 0</div>
<div class="box" id="best">Best: 0</div>
<div class="box" id="level">Level: 1</div>
</div>

<div id="stage" class="stage">
<div class="emoji" id="emoji">❓</div>
<button class="btn" onclick="restart()">↺ Restart</button>
<div class="hint" id="hint"></div>
<div id="options"></div>
</div>

<script>
const levels=[{
name:"Animals",
words:[
["cat","🐱"],["dog","🐶"],["bird","🐦"],["fish","🐟"],["rabbit","🐰"],
["lion","🦁"],["tiger","🐯"],["monkey","🐵"],["frog","🐸"],["pig","🐷"],
["cow","🐮"],["horse","🐴"],["sheep","🐑"],["duck","🦆"],["chicken","🐔"]
]}];

let level=0,score=0,streak=0,best=0;
let queue=[],review=[],current=null,lock=false;

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function speak(word){
  const u=new SpeechSynthesisUtterance(word);
  u.lang="en-US";
  u.rate=0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function resetQueue(){
  queue=shuffle(levels[level].words);
  review=[];
}

function nextWord(){
  if(review.length>0)return review.shift();
  if(queue.length===0)resetQueue();
  return queue.shift();
}

function build(){
  current=nextWord();
  emoji.innerText=current[1];

  let opts=shuffle(levels[level].words).slice(0,4).map(x=>x[0]);
  if(!opts.includes(current[0]))opts[0]=current[0];

  options.innerHTML="";
  shuffle(opts).forEach(word=>{
    const b=document.createElement("button");
    b.className="option";
    b.innerText=word;
    b.onclick=()=>choose(word,b);
    options.appendChild(b);
  });

  hint.innerText="";
}

function choose(word,btn){
  if(lock)return;
  lock=true;

  if(word===current[0]){
    btn.classList.add("correct");
    hint.innerText="✅ Correct";

    score++;streak++;
    if(streak>best)best=streak;
    update();

    // ✅ 先跳題（關鍵）
    switchNext();

    // ✅ 再背景發音（不卡UI）
    setTimeout(()=>speak(current[0]),100);

  }else{
    btn.classList.add("wrong");
    hint.innerText="❌ Wrong";
    streak=0;
    review.push(current);
    update();
    setTimeout(()=>lock=false,400);
  }
}

function switchNext(){
  stage.classList.add("hide");
  setTimeout(()=>{
    build();
    stage.classList.remove("hide");
    lock=false;
  },180);
}

function update(){
  scoreEl.innerText="Score: "+score;
  streakEl.innerText="Streak: "+streak;
  bestEl.innerText="Best: "+best;
  levelEl.innerText="Level: "+(level+1);
  subtitle.innerText="Level 1 · Animals";
}

function restart(){
  level=0;score=0;streak=0;best=0;
  speechSynthesis.cancel();
  resetQueue();
  update();
  build();
}

const scoreEl=document.getElementById("score");
const streakEl=document.getElementById("streak");
const bestEl=document.getElementById("best");
const levelEl=document.getElementById("level");
const emoji=document.getElementById("emoji");
const options=document.getElementById("options");
const hint=document.getElementById("hint");
const stage=document.getElementById("stage");
const subtitle=document.getElementById("subtitle");

resetQueue();
update();
build();
</script>

</body>
</html>

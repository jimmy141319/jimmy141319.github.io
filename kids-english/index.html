<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English V16</title>

<style>
body{
  margin:0;
  font-family:-apple-system;
  background:#eef1f7;
  text-align:center;
}

h1{
  color:#4a78f0;
  font-size:42px;
}

.box{
  display:inline-block;
  background:white;
  padding:10px 14px;
  border-radius:16px;
  margin:4px;
  font-weight:bold;
}

button{
  border:none;
  border-radius:16px;
  padding:14px;
  margin:8px;
  font-size:18px;
  width:80%;
  max-width:320px;
}

.option{
  background:white;
}

.correct{
  background:#11b35c;
  color:white;
  transform:scale(1.05);
}

.wrong{
  background:#d84b4b;
  color:white;
}

.big{
  font-size:100px;
  margin:20px;
  transition:0.2s;
}

.bounce{
  animation:bounce 0.3s;
}

@keyframes bounce{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

.hint{
  font-size:24px;
  min-height:30px;
}

</style>
</head>

<body>

<h1>Jimmy Kids English</h1>

<div class="box" id="score">Score:0</div>
<div class="box" id="streak">Streak:0</div>

<div class="big" id="emoji">🐶</div>

<div id="hint" class="hint"></div>

<div id="options"></div>

<script>
const data=[
{emoji:"🐶",word:"dog"},
{emoji:"🐱",word:"cat"},
{emoji:"🐟",word:"fish"},
{emoji:"🐰",word:"rabbit"},
{emoji:"🦁",word:"lion"},
{emoji:"🐯",word:"tiger"},
{emoji:"🐸",word:"frog"},
{emoji:"🐮",word:"cow"},
{emoji:"🐔",word:"chicken"}
];

let score=0;
let streak=0;
let current=null;

function speak(text){
  const u=new SpeechSynthesisUtterance(text);
  u.lang="en-US";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function next(){
  current=data[Math.floor(Math.random()*data.length)];
  emoji.innerText=current.emoji;

  let choices=[current.word];

  while(choices.length<4){
    let w=data[Math.floor(Math.random()*data.length)].word;
    if(!choices.includes(w)) choices.push(w);
  }

  choices.sort(()=>Math.random()-0.5);

  options.innerHTML="";
  hint.innerText="";

  choices.forEach(c=>{
    const btn=document.createElement("button");
    btn.className="option";
    btn.innerText=c;

    btn.onclick=()=>select(c,btn);

    options.appendChild(btn);
  });
}

function select(c,btn){
  if(c===current.word){

    btn.classList.add("correct");
    emoji.classList.add("bounce");

    speak(c);

    score++;
    streak++;

    if(streak>=10) hint.innerText="🔥 Amazing!";
    else if(streak>=5) hint.innerText="💪 Great!";
    else if(streak>=3) hint.innerText="👍 Nice!";
    else hint.innerText="✅ Correct";

    update();

    setTimeout(()=>{
      emoji.classList.remove("bounce");
      next();
    },300);

  }else{
    btn.classList.add("wrong");
    hint.innerText="❌ Try again";
    streak=0;
    update();

    setTimeout(()=>{
      btn.classList.remove("wrong");
    },300);
  }
}

function update(){
  scoreEl.innerText="Score:"+score;
  streakEl.innerText="Streak:"+streak;
}

const scoreEl=document.getElementById("score");
const streakEl=document.getElementById("streak");

next();
</script>

</body>
</html>

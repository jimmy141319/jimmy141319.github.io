<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimmy Kids English</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#eef1f7;
  text-align:center;
}
h1{
  font-size:60px;
  color:#4a78f0;
  margin:20px 0;
}
.subtitle{
  color:#666;
  margin-bottom:20px;
}
.top{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.box{
  background:white;
  padding:12px 20px;
  border-radius:20px;
  font-weight:bold;
}
.stage{
  transition:opacity 0.18s ease, transform 0.18s ease;
  opacity:1;
  transform:translateY(0);
}
.stage.hide{
  opacity:0;
  transform:translateY(8px);
}
.emoji{
  font-size:100px;
  margin:30px 0;
  min-height:120px;
}
button{
  border:none;
  border-radius:20px;
  padding:14px 24px;
  font-size:20px;
  margin:8px;
  transition:all 0.18s ease;
}
.option{
  background:white;
  color:#4a78f0;
  font-weight:bold;
  min-width:120px;
  box-shadow:0 6px 14px rgba(0,0,0,0.06);
}
.option.correct{
  background:#11b35c;
  color:white;
  transform:scale(1.05);
}
.option.wrong{
  background:#d84b4b;
  color:white;
  transform:scale(1.05);
}
.option:disabled{
  opacity:0.95;
}
.btn{
  background:#4a78f0;
  color:white;
}
.hint{
  font-size:26px;
  margin:10px;
  min-height:40px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>Jimmy Kids English</h1>
<div class="subtitle" id="subtitle"></div>

<div class="top">
  <div class="box" id="score">Score: 0</div>
  <div class="box" id="streak">Streak: 0</div>
  <div class="box" id="best">Best: 0</div>
  <div class="box" id="level">Level: 1</div>
</div>

<div id="stage" class="stage">
  <div class="emoji" id="emoji">❓</div>
  <button class="btn" onclick="restart()">↺ Restart</button>
  <div class="hint" id="hint"></div>
  <div id="options"></div>
</div>

<script>
const levels = [
{
  name:"Animals",
  words:[
    ["cat","🐱"],["dog","🐶"],["bird","🐦"],["fish","🐟"],["rabbit","🐰"],
    ["lion","🦁"],["tiger","🐯"],["monkey","🐵"],["frog","🐸"],["pig","🐷"],
    ["cow","🐮"],["horse","🐴"],["sheep","🐑"],["duck","🦆"],["chicken","🐔"]
  ]
},
{
  name:"Food",
  words:[
    ["apple","🍎"],["banana","🍌"],["orange","🍊"],["grape","🍇"],["bread","🍞"],
    ["cake","🍰"],["pizza","🍕"],["rice","🍚"],["milk","🥛"],["egg","🥚"],
    ["burger","🍔"],["fries","🍟"],["donut","🍩"],["cookie","🍪"],["chocolate","🍫"]
  ]
},
{
  name:"Daily",
  words:[
    ["car","🚗"],["bus","🚌"],["book","📘"],["phone","📱"],["ball","⚽"],
    ["chair","🪑"],["clock","🕒"],["house","🏠"],["star","⭐"],["sun","☀️"],
    ["moon","🌙"],["bed","🛏️"],["door","🚪"],["window","🪟"],["bag","🎒"]
  ]
}
];

let level = 0;
let score = 0;
let streak = 0;
let best = 0;
let queue = [];
let review = [];
let current = null;
let lock = false;

const scoreEl = document.getElementById("score");
const streakEl = document.getElementById("streak");
const bestEl = document.getElementById("best");
const levelEl = document.getElementById("level");
const subtitleEl = document.getElementById("subtitle");
const emojiEl = document.getElementById("emoji");
const optionsEl = document.getElementById("options");
const hintEl = document.getElementById("hint");
const stageEl = document.getElementById("stage");

function shuffle(arr){
  return [...arr].sort(() => Math.random() - 0.5);
}

function speak(word){
  const u = new SpeechSynthesisUtterance(word);
  u.lang = "en-US";
  u.rate = 0.85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function update(){
  scoreEl.innerText = "Score: " + score;
  streakEl.innerText = "Streak: " + streak;
  bestEl.innerText = "Best: " + best;
  levelEl.innerText = "Level: " + (level + 1);
  subtitleEl.innerText = "Level " + (level + 1) + " · " + levels[level].name;
}

function resetQueue(){
  queue = shuffle(levels[level].words);
  review = [];
}

function nextWord(){
  if(review.length > 0) return review.shift();
  if(queue.length === 0) resetQueue();
  return queue.shift();
}

function setButtonsDisabled(disabled){
  document.querySelectorAll(".option").forEach(btn => {
    btn.disabled = disabled;
  });
}

function build(){
  current = nextWord();
  emojiEl.innerText = current[1];
  hintEl.innerText = "";

  let opts = shuffle(levels[level].words).slice(0, 4).map(x => x[0]);
  if(!opts.includes(current[0])) opts[0] = current[0];
  opts = shuffle(opts);

  optionsEl.innerHTML = "";
  opts.forEach(word => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerText = word;
    btn.onclick = () => choose(word, btn);
    optionsEl.appendChild(btn);
  });
}

function goNextQuestion(){
  stageEl.classList.add("hide");

  setTimeout(() => {
    if(score > 0 && score % 10 === 0){
      level++;
      if(level >= levels.length){
        update();
        alert("🎉 Finished!");
        lock = false;
        stageEl.classList.remove("hide");
        return;
      }
      resetQueue();
    }

    update();
    build();
    stageEl.classList.remove("hide");
    lock = false;
  }, 180);
}

function choose(word, btn){
  if(lock) return;
  lock = true;
  setButtonsDisabled(true);

  if(word === current[0]){
    btn.classList.add("correct");
    hintEl.innerText = "✅ Correct";

    const spokenWord = current[0];

    score++;
    streak++;
    if(streak > best) best = streak;

    // 先切題，再背景發音
    goNextQuestion();
    setTimeout(() => speak(spokenWord), 80);

  } else {
    btn.classList.add("wrong");
    hintEl.innerText = "❌ Wrong";

    streak = 0;
    review.push(current);
    update();

    setTimeout(() => {
      setButtonsDisabled(false);
      lock = false;
    }, 420);
  }
}

function restart(){
  level = 0;
  score = 0;
  streak = 0;
  best = 0;
  lock = false;
  speechSynthesis.cancel();
  resetQueue();
  update();
  build();
  stageEl.classList.remove("hide");
}

resetQueue();
update();
build();
</script>

</body>
</html>
